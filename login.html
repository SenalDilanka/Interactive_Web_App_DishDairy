<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DishDiary | Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="images/logo/DishDiary_logo.png" alt="DishDiary logo" class="site-logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="recipe.html">Recipes</a></li>
          <li class="nav-item"><a class="nav-link" href="tips.html">Cooking Tips</a></li>
          <li class="nav-item"><a class="nav-link" href="add-recipe.html">Add Recipe</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
        </ul>
        <a href="login.html" class="btn custom-btn">Login</a>
      </div>
    </div>
  </nav>

  <section class="login-section d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <div class="form-card shadow-sm p-4 p-md-5">
            <h2 class="text-center mb-4">Login to DishDiary</h2>
            <form>
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email">
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter your password">
              </div>

              <div class="d-grid">
                <button type="submit" class="btn custom-btn">Sign In</button>
              </div>

              <div class="text-center mt-3">
                <a href="#" class="text-decoration-none">Forgot Password?</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer-section py-4">
    <div class="container text-center">
      <a href="index.html" class="footer-logo-link d-inline-block mb-3">
        <img src="images/logo/DishDiary_logo.png" alt="DishDiary logo" class="footer-logo">
      </a>
      <p class="mb-2">Your digital recipe companion.</p>
      <div class="mb-3">
        <a href="index.html" class="footer-link">Home</a>
        <a href="recipe.html" class="footer-link">Recipes</a>
        <a href="tips.html" class="footer-link">Tips</a>
        <a href="about.html" class="footer-link">About</a>
      </div>
      <p class="mb-0">© 2026 DishDiary. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
